# Streamlit Cloud "Secrets"에 복사/붙여넣기용 예시입니다.
# 로컬 실행은 주로 `.env`/환경변수(`GOOGLE_APPLICATION_CREDENTIALS`)를 사용할 수 있습니다.
#
# 이 프로젝트 코드는 `st.secrets["gcp_service_account"]`와 `GOOGLE_SHEET_ID`만 필요로 합니다.

[gcp_service_account]
type = "service_account"
project_id = "YOUR_PROJECT_ID"
private_key_id = "YOUR_PRIVATE_KEY_ID"

# private_key는 서비스 계정 JSON에서 그대로 가져오세요.
# (개행이 포함된 키이므로 TOML 멀티라인 문자열 형태로 넣는 것을 권장합니다.)
private_key = """-----BEGIN PRIVATE KEY-----
PASTE_PRIVATE_KEY_HERE
-----END PRIVATE KEY-----"""

client_email = "YOUR_CLIENT_EMAIL"
client_id = "YOUR_CLIENT_ID"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/YOUR_CLIENT_X509_CERT_URL"
universe_domain = "googleapis.com"

# Google AI Studio (Gemini API) - 코드에서 직접 사용되지 않을 수 있음
GOOGLE_API_KEY = "YOUR_GOOGLE_API_KEY"

# Google Sheets Configuration
GOOGLE_SHEET_ID = "YOUR_SHEET_ID"